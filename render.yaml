services:
  - type: web
    name: filelab
    runtime: python
    buildCommand: "apt-get update && apt-get install -y ffmpeg poppler-utils libreoffice && pip install -r requirements.txt"
    startCommand: "uvicorn main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: PYTHON_VERSION
        value: "3.11"
